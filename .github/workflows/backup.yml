name: Archive Chem LibreTexts (30‑min cycles)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ---------------------------------------------------------------
      # Determine starting URLs
      # ---------------------------------------------------------------
      - name: Set starting URLs
        id: start_urls
        run: |
          if [ -f resume_urls.txt ] && [ -s resume_urls.txt ]; then
            echo "📌 Resuming from $(wc -l < resume_urls.txt) entry points"
            # Copy resume URLs as our seed list
            cp resume_urls.txt seed_urls.txt
          else
            echo "🆕 Starting fresh from homepage"
            echo "https://chem.libretexts.org/" > seed_urls.txt
          fi

      # ---------------------------------------------------------------
      # Download for 30 minutes, resuming from saved entry points
      # ---------------------------------------------------------------
      - name: Download for 30 minutes
        id: download
        continue-on-error: true
        run: |
          timeout 1800 wget \
            --recursive \
            --level=inf \
            --no-clobber \
            --no-remove-listing \
            --adjust-extension \
            --page-requisites \
            --no-parent \
            --domains=chem.libretexts.org \
            --wait=1 \
            --random-wait \
            --limit-rate=200k \
            --reject='*.pdf,*.zip,*.mp4,*.mov,*.avi,*.exe' \
            --directory-prefix=archive \
            --output-file=wget.log \
            --no-verbose \
            --input-file=seed_urls.txt

          echo "wget finished with exit code: $?"

      # ---------------------------------------------------------------
      # Extract newly downloaded URLs from this run
      # ---------------------------------------------------------------
      - name: Extract new URLs
        if: always()
        run: |
          grep -P 'URL:https?://[^ ]+' wget.log | \
            grep -oP 'URL:\K[^ ]+' | \
            sort -u > this_run_urls.txt

          echo "📊 URLs downloaded this run: $(wc -l < this_run_urls.txt)"

      # ---------------------------------------------------------------
      # Save the LAST 100 downloaded URLs as resume points
      # These are the deepest pages reached in this run
      # ---------------------------------------------------------------
      - name: Save resume points
        if: always()
        run: |
          if [ -s this_run_urls.txt ]; then
            # Take the last 100 URLs (deepest crawled pages) as next entry points
            # Exclude homepage and top-level pages to avoid re-crawling from the top
            tail -100 this_run_urls.txt | \
              grep -v 'chem.libretexts.org/index.html' | \
              grep -v 'chem.libretexts.org/robots.txt' | \
              grep -v 'chem.libretexts.org/@api' | \
              grep -v 'Special:' \
              > resume_urls.txt

            echo "🔖 Saved $(wc -l < resume_urls.txt) resume points for next run"
            echo "   Sample: $(head -3 resume_urls.txt)"
          else
            echo "⚠️ No new URLs downloaded this run"
          fi

          # Also maintain the master list of all downloaded URLs
          if [ -f downloaded_urls.txt ]; then
            cat downloaded_urls.txt this_run_urls.txt | sort -u > merged.txt
            mv merged.txt downloaded_urls.txt
          else
            cp this_run_urls.txt downloaded_urls.txt
          fi

          rm -f this_run_urls.txt

          echo "📦 Total unique URLs archived: $(wc -l < downloaded_urls.txt)"
          echo "📁 Total files on disk: $(find archive/ -type f | wc -l)"

      # ---------------------------------------------------------------
      # Commit and push
      # ---------------------------------------------------------------
      - name: Commit and push progress
        if: always()
        run: |
          git add archive/ wget.log downloaded_urls.txt resume_urls.txt seed_urls.txt
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            TOTAL=$(wc -l < downloaded_urls.txt 2>/dev/null || echo 0)
            FILES=$(find archive/ -type f | wc -l)
            git commit -m "📥 ${TOTAL} URLs / ${FILES} files — $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "✅ Pushed successfully."
          fi
