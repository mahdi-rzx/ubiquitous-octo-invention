name: Archive Chem LibreTexts (30‑min cycles)

on:
  schedule:
    # Every 30 minutes – each run downloads for at most 30 min, then stops
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ---------------------------------------------------------------
      # Download for exactly 30 minutes
      # ---------------------------------------------------------------
      - name: Download for 30 minutes
        id: download
        continue-on-error: true        # timeout = 124 is NOT a failure
        run: |
          timeout 300 wget \
            --mirror \
            --convert-links \
            --adjust-extension \
            --page-requisites \
            --no-parent \
            --domains=chem.libretexts.org \
            --wait=1 \
            --random-wait \
            --limit-rate=200k \
            --reject='*.pdf,*.zip,*.mp4,*.mov,*.avi,*.exe' \
            --directory-prefix=archive \
            --output-file=wget.log \
            --no-verbose \
            https://chem.libretexts.org/
          echo "wget ended with exit code: $?"

      # ---------------------------------------------------------------
      # Always commit & push, even if wget was killed
      # ---------------------------------------------------------------
      - name: Commit and push progress
        if: always()
        run: |
          git add archive/ wget.log
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "30‑min cycle checkpoint ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
