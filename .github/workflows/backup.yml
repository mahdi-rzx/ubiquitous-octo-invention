name: 🌐 Website Offline Backup

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: 'URL of the website to mirror'
        required: true
        default: 'https://chem.libretexts.org/'
      depth:
        description: 'Maximum recursion depth (1 = homepage, 5 = deep)'
        required: false
        default: '3'
      wait:
        description: 'Delay between requests (seconds)'
        required: false
        default: '0.5'
      output_name:
        description: 'Base name for the backup (without .zip)'
        required: false
        default: 'offline-backup'
      split_size:
        description: 'Split size (e.g., 90M, 2G, 500M). Leave blank for no split.'
        required: false
        default: '90M'

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🛠️ Install tools
        run: sudo apt-get update && sudo apt-get install -y wget zip

      - name: 🌍 Mirror website with wget
        run: |
          mkdir -p mirror_output
          wget \
            --mirror \
            --convert-links \
            --adjust-extension \
            --page-requisites \
            --no-parent \
            --wait=${{ github.event.inputs.wait }} \
            --level=${{ github.event.inputs.depth }} \
            --directory-prefix=./mirror_output \
            --no-verbose \
            ${{ github.event.inputs.site_url }}
          du -sh mirror_output/

      - name: 📦 Create ZIP archive (with optional split)
        run: |
          BASE_NAME="${{ github.event.inputs.output_name }}"
          SPLIT_SIZE="${{ github.event.inputs.split_size }}"
          cd mirror_output

          if [ -n "$SPLIT_SIZE" ]; then
            # Create split zip: parts named BASE_NAME.zip, BASE_NAME.z01, BASE_NAME.z02, ...
            zip -r -s "$SPLIT_SIZE" ../"$BASE_NAME.zip" .
            echo "Created split archives:"
            ls -lh ../${BASE_NAME}.* 2>/dev/null || true
          else
            # No split – single zip
            zip -r ../"$BASE_NAME.zip" .
            echo "Created single archive:"
            ls -lh ../"$BASE_NAME.zip"
          fi

      - name: 🚀 Push backup parts to repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          mkdir -p backups
          # Move all parts (or single zip)
          mv ../${{ github.event.inputs.output_name }}.* backups/ 2>/dev/null || mv ../${{ github.event.inputs.output_name }}.zip backups/
          
          git add backups/
          git commit -m "📦 Backup of ${{ github.event.inputs.site_url }}" || echo "No changes to commit"
          git push
