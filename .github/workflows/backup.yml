name: Archive Chem LibreTexts (30‑min cycles)

on:
  schedule:
    # Every 30 minutes – each run downloads for at most 30 min, then stops
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 35          # extra 5 min safety, but wget itself stops at 30 min

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Download for 30 minutes
        # timeout kills wget after exactly 30 minutes
        run: |
          timeout 1800 wget \
            --mirror \
            --convert-links \
            --adjust-extension \
            --page-requisites \
            --no-parent \
            --domains=chem.libretexts.org \
            --wait=1 \
            --random-wait \
            --limit-rate=200k \
            --reject='*.pdf,*.zip,*.mp4,*.mov,*.avi,*.exe' \
            --directory-prefix=archive \
            --output-file=wget.log \
            --no-verbose \
            https://chem.libretexts.org/

      - name: Commit and push progress
        if: always()   # even if wget was killed by timeout
        run: |
          git add archive/ wget.log
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "30‑min cycle checkpoint ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
