name: Archive Chem LibreTexts (30‑min cycles)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Download for 30 minutes
        id: download
        continue-on-error: true
        run: |
          timeout 180 wget \
            --recursive \
            --level=inf \
            --no-clobber \
            --no-remove-listing \
            --adjust-extension \
            --page-requisites \
            --no-parent \
            --domains=chem.libretexts.org \
            --wait=1 \
            --random-wait \
            --limit-rate=200k \
            --reject='*.pdf,*.zip,*.mp4,*.mov,*.avi,*.exe' \
            --directory-prefix=archive \
            --output-file=wget.log \
            --no-verbose \
            https://chem.libretexts.org/
          echo "wget ended with exit code: $?"

      - name: Save downloaded URL list
        if: always()
        run: |
          grep -Po "URL:\Khttps?://[^ ]+" wget.log | sort -u > this_run_urls.txt
          if [ -f downloaded_urls.txt ]; then
            cat downloaded_urls.txt this_run_urls.txt | sort -u > tmp && mv tmp downloaded_urls.txt
          else
            mv this_run_urls.txt downloaded_urls.txt
          fi
          rm -f this_run_urls.txt

      - name: Commit and push progress
        if: always()
        run: |
          git add archive/ wget.log downloaded_urls.txt
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "30‑min cycle checkpoint ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
