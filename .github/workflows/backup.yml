name: 🧪 Chemistry Library Offline Backup

on:
  workflow_dispatch:
    inputs:
      split_size:
        description: 'Split size for ZIP parts (e.g., 90M, 200M)'
        required: false
        default: '90M'
      wait_time:
        description: 'Delay between requests (seconds)'
        required: false
        default: '0.5'
  
  schedule:
    - cron: '0 0 1 * *'  # Monthly auto-backup

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🛠️ Install tools
        run: sudo apt-get update && sudo apt-get install -y wget zip

      - name: 🌍 Download Chemistry Textbooks
        run: |
          mkdir -p chemistry-library
          
          # Define all chemistry branches
          declare -A BOOKS=(
            ["organic"]="https://chem.libretexts.org/Bookshelves/Organic_Chemistry/"
            ["inorganic"]="https://chem.libretexts.org/Bookshelves/Inorganic_Chemistry/"
            ["analytical"]="https://chem.libretexts.org/Bookshelves/Analytical_Chemistry/"
            ["physical"]="https://chem.libretexts.org/Bookshelves/Physical_and_Theoretical_Chemistry/"
            ["general"]="https://chem.libretexts.org/Bookshelves/General_Chemistry/"
            ["biochemistry"]="https://chem.libretexts.org/Bookshelves/Biochemistry/"
          )
          
          # Download each book into its own folder
          for branch in "${!BOOKS[@]}"; do
            echo "📚 Downloading: $branch chemistry..."
            wget \
              --mirror \
              --convert-links \
              --adjust-extension \
              --page-requisites \
              --no-parent \
              --wait=${{ github.event.inputs.wait_time }} \
              --level=inf \
              --accept-regex "${BOOKS[$branch]}.*" \
              --reject-regex '(\.pdf$|\.PDF$|download|\.zip$)' \
              --directory-prefix="./chemistry-library/$branch" \
              --no-verbose \
              ${BOOKS[$branch]} || echo "⚠️ Some $branch pages failed"
          done
          
          echo "📊 Download complete! Size per branch:"
          du -sh chemistry-library/*/

      - name: 📦 Create ZIP archives (split)
        run: |
          SPLIT="${{ github.event.inputs.split_size }}"
          DATE_TAG=$(date +%Y-%m-%d)
          
          mkdir -p archives
          
          # Option 1: One big chemistry library ZIP
          echo "Creating complete chemistry library archive..."
          cd chemistry-library
          zip -r -s "$SPLIT" "../archives/chemistry-library-${DATE_TAG}.zip" .
          cd ..
          
          echo "📊 Archives created:"
          ls -lh archives/
          
          # Calculate total size
          echo "Total archive size:"
          du -sh archives/

      - name: 🚀 Commit and push to repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Move archives to backups folder
          mkdir -p backups
          mv archives/* backups/
          
          # Remove old backups (keep only latest 2)
          ls -t backups/chemistry-library-* | tail -n +3 | xargs -r rm
          
          git add backups/
          git commit -m "🧪 Update chemistry library backup ($(date +%Y-%m-%d))" || echo "No changes"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📊 Summary
        run: |
          echo "✅ Chemistry Library Backup Complete!"
          echo "📚 Books included:"
          echo "  • Organic Chemistry"
          echo "  • Inorganic Chemistry"  
          echo "  • Analytical Chemistry"
          echo "  • Physical & Theoretical Chemistry"
          echo "  • General Chemistry"
          echo "  • Biochemistry"
          echo ""
          echo "📦 Total size:"
          du -sh backups/
