name: 🌐 Resumable Chemistry Downloader

on:
  workflow_dispatch:
    inputs:
      book:
        description: 'Chemistry book to download'
        required: true
        type: choice
        options:
          - organic
          - inorganic
          - physical
          - analytical
          - general
          - ALL
        default: 'ALL'
  schedule:
    - cron: '*/50 * * * *'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install wget
        run: sudo apt-get update && sudo apt-get install -y wget

      - name: Download with proper recursion
        run: |
          declare -A BOOKS=(
            ["organic"]="https://chem.libretexts.org/Bookshelves/Organic_Chemistry/"
            ["inorganic"]="https://chem.libretexts.org/Bookshelves/Inorganic_Chemistry/"
            ["physical"]="https://chem.libretexts.org/Bookshelves/Physical_and_Theoretical_Chemistry/"
            ["analytical"]="https://chem.libretexts.org/Bookshelves/Analytical_Chemistry/"
            ["general"]="https://chem.libretexts.org/Bookshelves/General_Chemistry/"
          )
          
          TARGET="${{ github.event.inputs.book || 'ALL' }}"
          mkdir -p textbooks progress
          
          for book in "${!BOOKS[@]}"; do
            if [ "$TARGET" != "ALL" ] && [ "$TARGET" != "$book" ]; then
              continue
            fi
            
            url="${BOOKS[$book]}"
            dir="textbooks/${book}"
            progress_file="progress/${book}.txt"
            
            # Get previous count
            if [ -f "$progress_file" ]; then
              prev=$(cat "$progress_file")
            else
              prev=0
            fi
            
            echo ""
            echo "========================================="
            echo "📚 Downloading: $book"
            echo "   URL: $url"
            echo "   Previous files: $prev"
            echo "========================================="
            
            # RECURSIVE download with proper flags
            timeout 2520 wget \
              --recursive \
              --level=10 \
              --no-parent \
              --convert-links \
              --adjust-extension \
              --page-requisites \
              --wait=0.3 \
              --random-wait \
              --no-clobber \
              --directory-prefix="$dir" \
              --span-hosts \
              --domains=chem.libretexts.org,cdn.libretexts.org \
              --no-verbose \
              --timeout=15 \
              --tries=2 \
              --reject='*.pdf,*.zip,*.epub,*.svgz' \
              "$url" 2>&1 | grep -v "^$" | tail -50 || true
            
            # Count files recursively
            new=$(find "$dir" -type f -name "*.html" -o -name "*.htm" 2>/dev/null | wc -l)
            echo "$new" > "$progress_file"
            
            diff=$((new - prev))
            size=$(du -sh "$dir" 2>/dev/null | cut -f1)
            
            echo "  ✅ +$diff new files"
            echo "  📊 Total: $new files"
            echo "  💾 Size: $size"
            
            # Show what was downloaded
            if [ "$diff" -gt 0 ]; then
              echo "  📄 Newest files:"
              find "$dir" -name "*.html" -newer "$progress_file" -type f 2>/dev/null | head -5 | while read f; do
                echo "    - $(basename "$f")"
              done
            fi
          done

      - name: Debug - show directory structure
        if: always()
        run: |
          echo ""
          echo "========================================="
          echo "🔍 DIRECTORY STRUCTURE"
          echo "========================================="
          for book in organic inorganic physical analytical general; do
            dir="textbooks/${book}"
            if [ -d "$dir" ]; then
              echo ""
              echo "📁 $book:"
              echo "  Total files: $(find $dir -type f | wc -l)"
              echo "  Total dirs: $(find $dir -type d | wc -l)"
              echo "  First 3 levels:"
              find "$dir" -maxdepth 3 -type d 2>/dev/null | head -20 | while read d; do
                count=$(ls "$d" 2>/dev/null | wc -l)
                echo "    $d/ ($count items)"
              done
            else
              echo "  ❌ $book: directory not found"
            fi
          done

      - name: Show overall progress
        run: |
          echo ""
          echo "========================================="
          echo "📊 OVERALL PROGRESS"
          echo "========================================="
          total=0
          for book in organic inorganic physical analytical general; do
            count=$(cat progress/${book}.txt 2>/dev/null || echo 0)
            size=$(du -sh textbooks/${book} 2>/dev/null | cut -f1 || echo 0)
            printf "  %-15s %6s files  %8s\n" "$book" "$count" "$size"
            total=$((total + count))
          done
          echo "  -------------------------------------"
          printf "  %-15s %6s files  %8s\n" "TOTAL" "$total" "$(du -sh textbooks 2>/dev/null | cut -f1)"
          echo "========================================="

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add textbooks/ progress/ 2>/dev/null
          
          if git diff --staged --quiet; then
            echo "No new files to commit"
          else
            total=$(find textbooks -name "*.html" -o -name "*.htm" | wc -l)
            git commit -m "📚 Progress: $total total pages | $(date +%H:%M)"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
