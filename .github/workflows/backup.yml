name: 🌐 Resumable Chemistry Downloader

on:
  workflow_dispatch:
    inputs:
      book:
        description: 'Chemistry book to download'
        required: true
        type: choice
        options:
          - organic
          - inorganic
          - physical
          - analytical
          - general
          - ALL
        default: 'ALL'
  schedule:
    - cron: '*/50 * * * *'  # Every 50 minutes

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 45  # Stop before next trigger
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install wget
        run: sudo apt-get update && sudo apt-get install -y wget

      - name: Download with resume
        run: |
          # Define books
          declare -A BOOKS=(
            ["organic"]="https://chem.libretexts.org/Bookshelves/Organic_Chemistry/"
            ["inorganic"]="https://chem.libretexts.org/Bookshelves/Inorganic_Chemistry/"
            ["physical"]="https://chem.libretexts.org/Bookshelves/Physical_and_Theoretical_Chemistry/"
            ["analytical"]="https://chem.libretexts.org/Bookshelves/Analytical_Chemistry/"
            ["general"]="https://chem.libretexts.org/Bookshelves/General_Chemistry/"
          )
          
          TARGET="${{ github.event.inputs.book || 'ALL' }}"
          mkdir -p textbooks progress
          
          for book in "${!BOOKS[@]}"; do
            # Skip if not ALL and not this book
            if [ "$TARGET" != "ALL" ] && [ "$TARGET" != "$book" ]; then
              continue
            fi
            
            url="${BOOKS[$book]}"
            dir="textbooks/${book}"
            progress_file="progress/${book}.txt"
            
            # Get previous count
            if [ -f "$progress_file" ]; then
              prev=$(cat "$progress_file")
            else
              prev=0
            fi
            
            echo ""
            echo "========================================="
            echo "📚 $book"
            echo "   Previous files: $prev"
            echo "   Current size: $(du -sh $dir 2>/dev/null | cut -f1 || echo 0)"
            echo "========================================="
            
            # Download with no-clobber (skip existing) - 42 minute timeout
            timeout 2520 wget \
              --mirror \
              --convert-links \
              --adjust-extension \
              --page-requisites \
              --no-parent \
              --wait=0.5 \
              --random-wait \
              --level=inf \
              --no-clobber \
              --directory-prefix="$dir" \
              --no-verbose \
              --timeout=15 \
              --tries=2 \
              "$url" 2>&1 | grep -E "(saved|URL:)" | tail -100 || true
            
            # Update progress
            new=$(find "$dir" -name "*.html" -o -name "*.htm" 2>/dev/null | wc -l)
            echo "$new" > "$progress_file"
            diff=$((new - prev))
            echo "  ✅ +$diff new files"
            echo "  📊 Total: $new files"
            echo "  💾 Size: $(du -sh $dir 2>/dev/null | cut -f1)"
            echo ""
          done

      - name: Show combined status
        run: |
          echo ""
          echo "========================================="
          echo "📊 OVERALL PROGRESS"
          echo "========================================="
          total=0
          for book in organic inorganic physical analytical general; do
            count=$(cat progress/${book}.txt 2>/dev/null || echo 0)
            size=$(du -sh textbooks/${book} 2>/dev/null | cut -f1 || echo 0)
            printf "  %-15s %6s files  %8s\n" "$book" "$count" "$size"
            total=$((total + count))
          done
          echo "  -------------------------------------"
          printf "  %-15s %6s files  %8s\n" "TOTAL" "$total" "$(du -sh textbooks 2>/dev/null | cut -f1)"
          echo "========================================="

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add textbooks/ progress/ 2>/dev/null
          
          if git diff --staged --quiet; then
            echo "No new files to commit"
          else
            total=$(find textbooks -name "*.html" -o -name "*.htm" | wc -l)
            added=$(git diff --staged --name-only | wc -l)
            git commit -m "📚 +$added files | Total: $total pages | $(date +%H:%M)"
            git push || echo "Push failed, will retry next run"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
