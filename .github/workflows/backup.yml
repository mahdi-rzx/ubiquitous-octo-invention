name: Archive Chem LibreTexts (30‑min cycles)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # -----------------------------------------------------------------------
      # Build a file containing ONLY new URLs (not yet downloaded)
      # -----------------------------------------------------------------------
      - name: Build list of URLs still to download
        id: prepare
        run: |
          # Start from the homepage
          echo "https://chem.libretexts.org/" > urls_to_crawl.txt

          # If we have a record of previously downloaded URLs, remove them
          if [ -f downloaded_urls.txt ] && [ -s downloaded_urls.txt ]; then
            echo "Previously downloaded: $(wc -l < downloaded_urls.txt) URLs"

            # Create a temporary file with all crawled URLs (start with the seed)
            # This constantly-updated file will be compared against the exclusion list
          else
            echo "No previous progress found – starting fresh."
            touch downloaded_urls.txt
          fi

      # -----------------------------------------------------------------------
      # Download ONLY new URLs for exactly 30 minutes
      # -----------------------------------------------------------------------
      - name: Download for 30 minutes
        id: download
        continue-on-error: true
        run: |
          # The strategy:
          # 1. Let wget discover all URLs recursively (--spider mode without downloading bodies)
          # 2. Filter out already-downloaded URLs
          # 3. Download only the remaining new URLs
          #
          # But since we can't easily filter wget's internal queue,
          # we use a different approach:
          #
          # Run wget normally with --no-clobber.
          # Files already on disk will be SKIPPED (not re-downloaded).
          # wget will spider through them to discover new URLs, but won't fetch the bodies.
          # This is efficient because wget checks the local file FIRST.

          timeout 180 wget \
            --recursive \
            --level=inf \
            --no-clobber \
            --no-remove-listing \
            --adjust-extension \
            --page-requisites \
            --no-parent \
            --domains=chem.libretexts.org \
            --wait=1 \
            --random-wait \
            --limit-rate=200k \
            --reject='*.pdf,*.zip,*.mp4,*.mov,*.avi,*.exe' \
            --directory-prefix=archive \
            --output-file=wget.log \
            --no-verbose \
            https://chem.libretexts.org/

          echo "wget finished with exit code: $?"

      # -----------------------------------------------------------------------
      # Update the master list of downloaded URLs
      # -----------------------------------------------------------------------
      - name: Update downloaded URLs master list
        if: always()
        run: |
          # Extract all successfully-downloaded URLs from this run's log
          # Format: "URL:http://... [size] -> localfile"
          grep -P 'URL:https?://[^ ]+' wget.log | \
            grep -oP 'URL:\K[^ ]+' | \
            sort -u > this_run_urls.txt

          echo "URLs fetched this run: $(wc -l < this_run_urls.txt)"

          # Merge with existing master list and deduplicate
          if [ -f downloaded_urls.txt ]; then
            cat downloaded_urls.txt this_run_urls.txt | sort -u > merged_urls.txt
            mv merged_urls.txt downloaded_urls.txt
          else
            mv this_run_urls.txt downloaded_urls.txt
          fi

          rm -f this_run_urls.txt

          echo "Total unique URLs archived so far: $(wc -l < downloaded_urls.txt)"
          echo "Total files on disk: $(find archive/ -type f | wc -l)"

      # -----------------------------------------------------------------------
      # Commit and push everything
      # -----------------------------------------------------------------------
      - name: Commit and push progress
        if: always()
        run: |
          git add archive/ wget.log downloaded_urls.txt
          if git diff --cached --quiet; then
            echo "No changes to commit – archive is up to date."
          else
            # Create a meaningful commit message
            TOTAL_URLS=$(wc -l < downloaded_urls.txt)
            TOTAL_FILES=$(find archive/ -type f | wc -l)
            git commit -m "📥 Checkpoint: ${TOTAL_URLS} URLs / ${TOTAL_FILES} files — $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "✅ Successfully pushed archive progress to repository."
          fi
