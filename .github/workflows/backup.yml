name: 🌐 Resumable Chemistry Downloader

on:
  workflow_dispatch:
    inputs:
      book:
        description: 'Chemistry book to download'
        required: true
        type: choice
        options:
          - organic
          - inorganic
          - physical
          - analytical
          - general
          - ALL
        default: 'ALL'
  schedule:
    - cron: '*/50 * * * *'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y wget

      - name: Download with resume
        run: |
          declare -A BOOKS=(
            ["organic"]="https://chem.libretexts.org/Bookshelves/Organic_Chemistry/"
            ["inorganic"]="https://chem.libretexts.org/Bookshelves/Inorganic_Chemistry/"
            ["physical"]="https://chem.libretexts.org/Bookshelves/Physical_and_Theoretical_Chemistry/"
            ["analytical"]="https://chem.libretexts.org/Bookshelves/Analytical_Chemistry/"
            ["general"]="https://chem.libretexts.org/Bookshelves/General_Chemistry/"
          )
          
          TARGET="${{ github.event.inputs.book || 'ALL' }}"
          mkdir -p mirror_output progress
          
          for book in "${!BOOKS[@]}"; do
            if [ "$TARGET" != "ALL" ] && [ "$TARGET" != "$book" ]; then
              continue
            fi
            
            url="${BOOKS[$book]}"
            dir="mirror_output/${book}"
            progress_file="progress/${book}.txt"
            
            # Get previous count
            prev=$(cat "$progress_file" 2>/dev/null || echo 0)
            
            echo ""
            echo "========================================="
            echo "📚 $book"
            echo "   URL: $url"
            echo "   Previous files: $prev"
            echo "========================================="
            
            timeout 2520 wget \
              --mirror \
              --convert-links \
              --adjust-extension \
              --page-requisites \
              --no-parent \
              --wait=0.5 \
              --random-wait \
              --level=inf \
              --no-clobber \
              --directory-prefix="./$dir" \
              --no-verbose \
              --timeout=15 \
              --tries=2 \
              "$url" 2>&1 | tail -30 || true
            
            # Count all HTML files
            new=$(find "$dir" -name "*.html" -o -name "*.htm" 2>/dev/null | wc -l)
            echo "$new" > "$progress_file"
            
            diff=$((new - prev))
            size=$(du -sh "$dir" 2>/dev/null | cut -f1 || echo 0)
            
            echo "  ✅ +$diff new | Total: $new files | Size: $size"
            
            # Show directory tree if no files downloaded
            if [ "$new" -le 1 ]; then
              echo "  🔍 Directory structure:"
              find "$dir" -type d 2>/dev/null | head -10
              echo "  📄 Files found:"
              find "$dir" -type f 2>/dev/null | head -10
            fi
          done

      - name: Show overall progress
        run: |
          echo ""
          echo "========================================="
          echo "📊 OVERALL PROGRESS"
          echo "========================================="
          total=0
          for book in organic inorganic physical analytical general; do
            count=$(cat progress/${book}.txt 2>/dev/null || echo 0)
            size=$(du -sh mirror_output/${book} 2>/dev/null | cut -f1 || echo 0)
            printf "  %-15s %6s files  %8s\n" "$book" "$count" "$size"
            total=$((total + count))
          done
          echo "  -------------------------------------"
          printf "  %-15s %6s files  %8s\n" "TOTAL" "$total" "$(du -sh mirror_output 2>/dev/null | cut -f1)"
          echo "========================================="

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add mirror_output/ progress/ 2>/dev/null
          
          if git diff --staged --quiet; then
            echo "No new files"
          else
            total=$(find mirror_output -name "*.html" -o -name "*.htm" | wc -l)
            git commit -m "📚 $total pages | $(date +%H:%M)"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
